<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>참가자 화면 | Quiz Buzzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="brand"><span class="dot"></span> QUIZ BUZZER</div>

    <!-- ===== Step 1: Join form ===== -->
    <div class="card" id="joinCard">
      <h1>방 입장하기</h1>
      <p class="lead">닉네임과 호스트가 알려준 방 코드를 입력하세요.</p>

      <div class="field">
        <label for="nicknameInput">닉네임</label>
        <input type="text" id="nicknameInput" maxlength="20" placeholder="예: 클로드" />
      </div>

      <div class="field">
        <label for="codeInput">방 코드</label>
        <input type="text" id="codeInput" class="code-input" maxlength="10" placeholder="방 코드 입력" style="letter-spacing:4px;" />
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="joinBtn">입장하기</button>
      </div>
      <div class="error-msg" id="joinError"></div>
    </div>

    <!-- ===== Step 2: Game screen ===== -->
    <div id="gameScreen" style="display:none; width: 100%;">

      <div class="card">
        <div class="game-header">
          <div class="nickname-tag"><span id="nicknameTag"></span> 님</div>
          <div style="display:flex; gap:8px;">
            <span class="pill" id="playerCountPill">참가자 0명</span>
            <span class="pill unlocked" id="lockPill">버저 활성화됨</span>
          </div>
        </div>

        <div class="field">
          <label for="answerInput">정답 입력</label>
          <textarea id="answerInput" placeholder="여기에 정답을 입력하세요..." rows="2"></textarea>
        </div>

        <div class="buzzer-wrap">
          <button class="buzzer" id="buzzerBtn">BUZZ</button>
          <div class="buzzer-hint">버튼을 누르거나 <kbd>스페이스바</kbd>를 누르면 버저가 울려요.</div>
        </div>
        <div class="status-msg" id="buzzStatus"></div>
      </div>

      <div class="card">
        <div class="meta-row">
          <h2 style="margin:0;">버저 순서</h2>
          <span class="count">총 <span id="buzzCount">0</span>명</span>
        </div>
        <ul class="buzz-list" id="buzzList"></ul>
        <div class="empty-state" id="emptyState">아직 버저를 누른 참가자가 없습니다.</div>
      </div>
    </div>

    <div class="footer-note">실시간 퀴즈 버저 · Quiz Buzzer</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="player.js"></script>
</body>
</html>
