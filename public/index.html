<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>퀴즈 버저 | Quiz Buzzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="brand"><span class="dot"></span> QUIZ BUZZER</div>

    <div class="card">
      <h1>가장 빨리 누른 사람은?</h1>
      <p class="lead">
        방을 만들고 참가자들과 코드를 공유하세요.<br />
        참가자는 정답을 입력하고 버저를 눌러 순서대로 정렬됩니다.
      </p>

      <div class="btn-row" style="margin-bottom: 10px;">
        <button class="btn btn-primary" onclick="location.href='host.html'">
          🖥️ 호스트로 방 만들기
        </button>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="location.href='player.html'">
          🙋 참가자로 입장하기
        </button>
      </div>
    </div>

    <div class="card">
      <h2>이용 방법</h2>
      <p class="lead" style="margin-bottom:0;">
        1. 호스트가 방을 만들고 4자리 코드를 화면이나 화이트보드에 표시합니다.<br />
        2. 참가자는 닉네임과 코드를 입력해 방에 입장합니다.<br />
        3. 정답을 입력란에 적고 버저를 누르면, 호스트 화면에 누른 순서대로 표시됩니다.<br />
        4. 다음 문제로 넘어갈 때는 호스트가 "초기화" 버튼을 눌러 버저를 다시 활성화합니다.
      </p>
    </div>

    <div class="footer-note">실시간 퀴즈 버저 · Quiz Buzzer</div>
  </div>
</body>
</html>
